<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Automações</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0eb;
      --card: #ffffff;
      --text: #2d2416;
      --text-soft: #8a7a6a;
      --border: #e8ddd3;
      --shadow: rgba(80, 55, 30, 0.10);
      --accent: #f97316;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      background: #fff7f0;
      text-align: center;
      padding: 52px 24px 48px;
    }

    .hero-icon {
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, #f97316, #fb923c);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      margin: 0 auto 20px;
      box-shadow: 0 12px 32px rgba(249,115,22,0.28);
      animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    .hero h1 {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 8px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .hero p {
      font-size: 15px;
      color: var(--text-soft);
      font-weight: 600;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    /* ── Search ── */
    .search-area {
      max-width: 480px;
      margin: 28px auto 0;
      animation: fadeUp 0.5s 0.25s ease both;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-box svg {
      position: absolute;
      left: 16px;
      color: var(--text-soft);
    }

    #search {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 50px;
      padding: 13px 20px 13px 48px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px var(--shadow);
    }

    #search::placeholder { color: #c0b0a0; }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 2px 16px rgba(249,115,22,0.14);
    }

    /* ── Wave divider ── */
    .divider {
      overflow: hidden;
      line-height: 0;
      background: #fff7f0;
    }
    .divider svg { display: block; }

    /* ── Main content ── */
    .main {
      max-width: 660px;
      margin: 0 auto;
      padding: 36px 20px 80px;
    }

    /* ── Category filters ── */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
      justify-content: center;
      animation: fadeUp 0.5s 0.3s ease both;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 50px;
      border: 2px solid var(--border);
      background: #fff;
      color: var(--text-soft);
      cursor: pointer;
      transition: all 0.18s;
      box-shadow: 0 1px 4px var(--shadow);
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 14px rgba(249,115,22,0.30);
    }

    /* ── Card ── */
    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 18px 20px;
      text-decoration: none;
      color: var(--text);
      margin-bottom: 12px;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      box-shadow: 0 2px 8px var(--shadow);
      animation: fadeUp 0.4s ease both;
    }

    .link-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 8px 28px rgba(249,115,22,0.14);
    }

    .card-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .icon-orange { background: #fff3eb; }
    .icon-purple { background: #f3eeff; }
    .icon-green  { background: #ecfdf5; }
    .icon-blue   { background: #e0f2fe; }
    .icon-pink   { background: #fce7f3; }
    .icon-yellow { background: #fefce8; }

    .card-body { flex: 1; min-width: 0; }

    .card-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-desc {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-badge {
      font-size: 11px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 50px;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .badge-orange { background: #fff3eb; color: #c2530a; }
    .badge-purple { background: #f3eeff; color: #6d28d9; }
    .badge-green  { background: #ecfdf5; color: #15803d; }
    .badge-blue   { background: #e0f2fe; color: #0369a1; }
    .badge-pink   { background: #fce7f3; color: #be185d; }
    .badge-yellow { background: #fefce8; color: #a16207; }

    .card-arrow {
      color: #d0c0b0;
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }

    .link-card:hover .card-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    /* ── Empty ── */
    .empty {
      text-align: center;
      padding: 56px 0;
      display: none;
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    .empty p {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    .empty small {
      font-size: 13px;
      font-weight: 600;
      color: #c0b0a0;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      border-top: 2px solid var(--border);
      padding-top: 28px;
      margin-top: 8px;
    }

    footer p {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-soft);
    }

    footer span { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }    /* ── Mobile ── */
    @media (max-width: 480px) {
      .hero {
        padding: 36px 16px 32px;
      }
      .hero-icon {
        width: 72px;
        height: 72px;
        font-size: 34px;
        border-radius: 22px;
      }
      .hero h1 { font-size: 22px; }
      .hero p  { font-size: 13px; }

      .search-area { margin-top: 20px; }
      #search { font-size: 14px; padding: 12px 16px 12px 44px; }

      .main { padding: 24px 12px 60px; }

      .filters {
        flex-wrap: nowrap;
        overflow-x: auto;
        justify-content: flex-start;
        padding-bottom: 6px;
        margin-bottom: 24px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .filters::-webkit-scrollbar { display: none; }
      .filter-btn {
        white-space: nowrap;
        flex-shrink: 0;
        font-size: 12px;
        padding: 7px 13px;
      }

      .link-card {
        padding: 14px 14px;
        gap: 12px;
        border-radius: 14px;
      }
      .card-icon {
        width: 44px;
        height: 44px;
        font-size: 22px;
        border-radius: 12px;
      }
      .card-title { font-size: 14px; }
      .card-desc {
        font-size: 12px;
        white-space: normal;
        overflow: visible;
        text-overflow: unset;
      }
      .card-badge {
        display: inline-block;
        font-size: 10px;
        padding: 3px 8px;
      }
      .card-arrow { width: 15px; height: 15px; }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-icon">⚡</div>
  <h1>Minhas Automações</h1>
  <p>Acesse todas as ferramentas e fluxos em um só lugar</p>

  <div class="search-area">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="text" placeholder="O que você está procurando?" autocomplete="off"/>
    </div>
  </div>
</div>

<div class="divider">
  <svg viewBox="0 0 1440 40" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,20 C360,40 1080,0 1440,20 L1440,0 L0,0 Z" fill="#fff7f0"/>
  </svg>
</div>

<main class="main">
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">✨ Todos</button>
    <button class="filter-btn" data-filter="relatorio">📊 Relatórios</button>
    <button class="filter-btn" data-filter="util">🛠️ Utilitários</button>
    <button class="filter-btn" data-filter="fluxo">🔄 Fluxos</button>
  </div>

  <div id="links-container"></div>

  <div class="empty" id="empty">
    <div class="empty-icon">🔍</div>
    <p>Nenhuma automação encontrada</p>
    <small>Tente buscar por outro termo</small>
  </div>

  <footer>
    <p>✨ <span id="count"></span> automações disponíveis</p>
  </footer>
</main>

<script>  const links = [
    {
      title: "Análise de cartão de crédito",
      desc: "Organiza gastos por categoria e gera gráficos mensais",
      url: "https://leandrofeder.github.io/creditCardAnalyisis/",
      icon: "💳",
      iconBg: "icon-blue",
      badge: "Relatório",
      badgeBg: "badge-blue",
      category: "relatorio"
    },
    {
      title: "Calculadora de combustível",
      desc: "Analisa consumo e custo de viagens",
      url: "https://leandrofeder.github.io/fuel-efficiency",
      icon: "⛽",
      iconBg: "icon-purple",
      badge: "Utilitário",
      badgeBg: "badge-purple",
      category: "util"
    },
    {
      title: "Cardápio semanal",
      desc: "Sugestões de refeições para a semana toda e lista de compras",
      url: "https://leandrofeder.github.io/generate-weekly-menu",
      icon: "🍽️",
      iconBg: "icon-orange",
      badge: "Fluxo",
      badgeBg: "badge-orange",
      category: "fluxo"
    }
  ];
  // ─────────────────────────────────────────────────────

  let activeFilter = 'all';
  let searchQuery  = '';

  function filtered() {
    return links.filter(l => {
      const matchFilter = activeFilter === 'all' || l.category === activeFilter;
      const q = searchQuery.toLowerCase();
      const matchSearch = !q ||
        l.title.toLowerCase().includes(q) ||
        l.desc.toLowerCase().includes(q) ||
        l.badge.toLowerCase().includes(q);
      return matchFilter && matchSearch;
    });
  }

  function render() {
    const container = document.getElementById('links-container');
    const empty     = document.getElementById('empty');
    const list      = filtered();

    document.getElementById('count').textContent = links.length;
    container.innerHTML = '';

    if (list.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    list.forEach((l, i) => {
      const card = document.createElement('a');
      card.className = 'link-card';
      card.href      = l.url;
      card.target    = '_blank';
      card.rel       = 'noopener noreferrer';
      card.style.animationDelay = `${i * 0.07}s`;

      card.innerHTML = `
        <div class="card-icon ${l.iconBg}">${l.icon}</div>
        <div class="card-body">
          <div class="card-title">${l.title}</div>
          <div class="card-desc">${l.desc}</div>
        </div>
        <span class="card-badge ${l.badgeBg}">${l.badge}</span>
        <svg class="card-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>`;

      container.appendChild(card);
    });
  }

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });

  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });

  render();
</script>
</body>
</html>
