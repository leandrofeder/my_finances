<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>AgendaHub — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236c63ff' stroke-width='2.2'%3E%3Crect x='3' y='4' width='18' height='18' rx='2' fill='%23181825' stroke='%236c63ff'/%3E%3Cline x1='16' y1='2' x2='16' y2='6'/%3E%3Cline x1='8' y1='2' x2='8' y2='6'/%3E%3Cline x1='3' y1='10' x2='21' y2='10'/%3E%3Cline x1='7' y1='14' x2='10' y2='14' stroke-width='2.5'/%3E%3Cline x1='7' y1='18' x2='14' y2='18' stroke-width='2.5'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <span class="logo-text">AgendaHub</span>
    </div>

    <div class="drb" id="dateRangeBar">
      <span class="drb-label">De</span>
      <div class="date-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <input type="date" id="dateFrom" onchange="onRangeChange()">
      </div>
      <span class="drb-sep">→</span>
      <div class="date-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <input type="date" id="dateTo" onchange="onRangeChange()">
      </div>
      <div class="month-select-wrap" id="monthSelWrap" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <select class="msel" id="monthSel" onchange="onMonthSel(this.value)"></select>
        <div class="msel-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></div>
      </div>
      <button class="btn-clr" id="btnClr" onclick="clearRange()" style="display:none">✕ limpar</button>
    </div>

    <div class="hsp"></div>

    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Alternar tema">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      <svg class="icon-sun"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>    <!-- Dropdown de importação -->
    <div style="position:relative" id="importWrap">
      <button class="btn-import" onclick="toggleImportMenu()" id="btnImportMain">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Importar
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:10px;height:10px;margin-left:2px"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div id="importMenu" style="display:none;position:absolute;right:0;top:calc(100% + 6px);background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:6px;min-width:220px;z-index:99;box-shadow:0 8px 24px rgba(0,0,0,.3)">
        <button onclick="document.getElementById('fi').click();closeImportMenu()" style="display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;cursor:pointer;color:var(--text);font-family:var(--font);font-size:12px;padding:8px 10px;border-radius:7px;text-align:left;transition:background .1s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='none'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <div>
            <div style="font-weight:600">Relatório semanal</div>
            <div style="font-size:10px;color:var(--muted);margin-top:1px">CSV ou TXT por semana</div>
          </div>
        </button>
        <button onclick="document.getElementById('fi-history').click();closeImportMenu()" style="display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;cursor:pointer;color:var(--text);font-family:var(--font);font-size:12px;padding:8px 10px;border-radius:7px;text-align:left;transition:background .1s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='none'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--violet)" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
          <div>
            <div style="font-weight:600">Histórico consolidado</div>
            <div style="font-size:10px;color:var(--muted);margin-top:1px">CSV exportado por esta plataforma</div>
          </div>
        </button>
      </div>
    </div>
    <input type="file" id="fi"         multiple accept=".csv,.txt" style="display:none">
    <input type="file" id="fi-history"          accept=".csv"      style="display:none">
  </header>

  <div id="body">
    <aside id="sidebar">
      <button class="nav-item on" onclick="setTab('dashboard')" id="nav-dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" onclick="setTab('patients')" id="nav-patients">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Pacientes</span>
      </button>
      <button class="nav-item" onclick="setTab('schedule')" id="nav-schedule">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>Agenda</span>
      </button>
      <button class="nav-item" onclick="setTab('settings')" id="nav-settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
        <span>Config.</span>
      </button>
      <div class="sbsp"></div>
      <div id="sbFiles"></div>
    </aside>
    <main id="main"></main>
  </div>
</div>

<!-- Estado e utilitários (carregam primeiro) -->
<script src="js/state.js"></script>
<script src="js/theme.js"></script>
<script src="js/storage.js"></script>
<script src="js/formatters.js"></script>
<script src="js/parser.js"></script>
<script src="js/data.js"></script>
<script src="js/dateRange.js"></script>
<script src="js/exporter.js"></script>

<!-- Módulos de UI -->
<script src="js/ui.js"></script>
<script src="js/navigation.js"></script>
<script src="js/fileHandler.js"></script>
<script src="js/render.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/patients.js"></script>
<script src="js/schedule.js"></script>
<script src="js/settings.js"></script>

<!-- Inicialização (sempre por último) -->
<script src="js/init.js"></script>

<script>
  /* ── Dropdown de importação ── */
  function toggleImportMenu() {
    const m = document.getElementById('importMenu');
    m.style.display = m.style.display === 'none' ? '' : 'none';
  }
  function closeImportMenu() {
    const m = document.getElementById('importMenu');
    if (m) m.style.display = 'none';
  }
  document.addEventListener('click', e => {
    const wrap = document.getElementById('importWrap');
    if (wrap && !wrap.contains(e.target)) closeImportMenu();
  });
</script>
</body>
</html>
